<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>IG Story — Nuevos precios</title>
<meta name="viewport" content="width=1080, initial-scale=1" />
<style>
  :root {
    --bg: #0a0a0a;
    --accent: #CDFF00;
    --muted: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; color: #fff; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .canvas {
    width: 1080px; height: 1920px;
    background:
      radial-gradient(900px 700px at 100% -5%, rgba(205,255,0,0.22), transparent 60%),
      radial-gradient(900px 700px at 0% 100%, rgba(205,255,0,0.12), transparent 60%),
      linear-gradient(180deg, #0a0a0a 0%, #0c0c0c 50%, #0a0a0a 100%);
    padding: 140px 90px 120px; display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .canvas::before { content: ""; position: absolute; top: 120px; left: 40px; right: 40px; bottom: 80px; border: 1px solid rgba(255,255,255,0.06); border-radius: 56px; pointer-events: none; }

  .top { display: flex; align-items: center; gap: 18px; justify-content: center; margin-bottom: 40px; }
  .dot { width: 16px; height: 16px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 24px var(--accent); }
  .brand { font-size: 26px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); font-weight: 800; }

  .pill { align-self: center; margin-bottom: 50px; display: inline-flex; align-items: center; gap: 12px; padding: 14px 32px; border-radius: 999px; background: rgba(205,255,0,0.15); border: 1px solid rgba(205,255,0,0.3); color: var(--accent); font-size: 28px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; }

  h1 { font-size: 140px; line-height: 0.9; letter-spacing: -0.04em; font-weight: 900; text-align: center; }
  h1 span { color: var(--accent); }

  .price-hero { text-align: center; margin-top: 60px; }
  .price-hero .label { font-size: 28px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 800; }
  .price-hero .main { font-size: 220px; line-height: 0.9; font-weight: 900; color: var(--accent); margin-top: 10px; }
  .price-hero .main .cur { font-size: 58px; color: var(--muted); margin-left: 12px; font-weight: 800; vertical-align: middle; }
  .price-hero .old { font-size: 44px; color: #555; text-decoration: line-through; margin-top: 14px; font-weight: 800; }

  .grid { margin-top: 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 24px; text-align: center; }
  .card .dur { font-size: 24px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 800; }
  .card .val { font-size: 56px; color: var(--accent); font-weight: 900; margin-top: 8px; }
  .card .pct { display: inline-block; margin-top: 10px; background: var(--accent); color: #000; font-weight: 900; font-size: 18px; padding: 4px 12px; border-radius: 999px; letter-spacing: 0.1em; }

  .cta { margin-top: auto; background: var(--accent); color: #000; font-weight: 900; font-size: 44px; padding: 28px 56px; border-radius: 999px; box-shadow: 0 30px 60px rgba(205,255,0,0.35); display: inline-flex; align-items: center; gap: 20px; align-self: center; }

  .swipe { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--muted); font-size: 26px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
  .arrow { font-size: 36px; color: var(--accent); animation: bob 1.4s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .badge { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 22px; border-radius: 999px; font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800; }
  .badge strong { color: var(--accent); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="badge">Primer mes <strong>GRATIS</strong></div>

    <div class="top">
      <span class="dot"></span>
      <span class="brand">Pablo Scarlatto</span>
    </div>

    <span class="pill">Nuevo precio</span>

    <h1>BAJÉ LOS<br/><span>PRECIOS</span></h1>

    <div class="price-hero">
      <div class="label">Plan mensual desde</div>
      <div class="main">$1.800<span class="cur">UYU</span></div>
      <div class="old">$3.200</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="dur">3 meses</div>
        <div class="val">$4.320</div>
        <span class="pct">−20%</span>
      </div>
      <div class="card">
        <div class="dur">6 meses</div>
        <div class="val">$7.200</div>
        <span class="pct">−33%</span>
      </div>
      <div class="card">
        <div class="dur">1 año</div>
        <div class="val">$10.800</div>
        <span class="pct">−50%</span>
      </div>
      <div class="card" style="background: rgba(205,255,0,0.08); border-color: rgba(205,255,0,0.3);">
        <div class="dur" style="color: var(--accent);">Prueba</div>
        <div class="val" style="font-size: 44px; margin-top: 12px;">GRATIS</div>
        <span class="pct" style="background: #10b981;">1er mes</span>
      </div>
    </div>

    <div class="cta">Quiero mi plan →</div>

    <div class="swipe">
      <span class="arrow">↑</span>
      <span>Desliza · Link en bio</span>
    </div>
  </div>
</body>
</html>
