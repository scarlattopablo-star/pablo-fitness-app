<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1920px;
    font-family: 'Outfit', sans-serif;
    background: #09090b;
    color: white;
    overflow: hidden;
    position: relative;
  }
  /* Background transformation photo */
  .bg-photo {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 55%;
    object-fit: cover;
    object-position: top;
  }
  .bg-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 55%;
    background: linear-gradient(to bottom, rgba(9,9,11,0.1) 0%, rgba(9,9,11,0.4) 60%, rgba(9,9,11,1) 100%);
  }
  .content {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column;
    padding: 60px;
  }
  /* Top badge */
  .top-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 22px; font-weight: 700;
    color: white;
    align-self: flex-start;
  }
  .top-badge .dot {
    width: 8px; height: 8px;
    background: #ff4444;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  /* Middle section */
  .middle {
    margin-top: auto;
    margin-bottom: 40px;
  }
  .price-tag {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, #00e676, #00c853);
    border-radius: 16px;
    padding: 16px 28px;
    margin-bottom: 30px;
  }
  .price-tag .from { font-size: 22px; font-weight: 600; color: rgba(0,0,0,0.6); }
  .price-tag .price { font-size: 42px; font-weight: 900; color: #09090b; }
  .price-tag .period { font-size: 22px; font-weight: 600; color: rgba(0,0,0,0.6); }
  .headline {
    font-size: 76px; font-weight: 900;
    line-height: 0.95;
    letter-spacing: -2px;
    margin-bottom: 24px;
  }
  .sub {
    font-size: 32px;
    color: rgba(255,255,255,0.6);
    line-height: 1.4;
    margin-bottom: 40px;
  }
  /* What you get */
  .features {
    display: flex; flex-direction: column; gap: 20px;
    margin-bottom: 50px;
  }
  .feat {
    display: flex; align-items: center; gap: 18px;
  }
  .feat .check {
    width: 44px; height: 44px;
    background: rgba(0,230,118,0.15);
    border: 2px solid rgba(0,230,118,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #00e676;
    flex-shrink: 0;
  }
  .feat .text {
    font-size: 30px; font-weight: 600;
    color: rgba(255,255,255,0.9);
  }
  /* CTA */
  .cta {
    background: linear-gradient(135deg, #00e676, #00c853);
    color: #09090b;
    font-size: 36px; font-weight: 900;
    padding: 28px 0;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    letter-spacing: 1px;
  }
  .bottom-text {
    text-align: center;
    margin-top: 20px;
    font-size: 24px;
    color: rgba(255,255,255,0.4);
  }
  /* Before/after labels on photo */
  .label-before {
    position: absolute; bottom: calc(45% + 20px); left: 80px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    color: white;
    font-size: 20px; font-weight: 800;
    padding: 8px 18px;
    border-radius: 50px;
    letter-spacing: 2px;
  }
  .label-after {
    position: absolute; bottom: calc(45% + 20px); right: 80px;
    background: linear-gradient(135deg, #00e676, #00c853);
    color: #09090b;
    font-size: 20px; font-weight: 800;
    padding: 8px 18px;
    border-radius: 50px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <img src="images/transf-hombre-musculo.jpg" class="bg-photo" />
  <div class="bg-overlay"></div>
  <div class="label-before">ANTES</div>
  <div class="label-after">DESPUES</div>

  <div class="content">
    <div class="top-badge">
      <div class="dot"></div>
      RESULTADO REAL DE UN CLIENTE
    </div>

    <div class="middle">
      <div class="headline">
        TU PLAN<br>
        COMPLETO
      </div>
      <div class="sub">
        Entrenamiento + nutricion<br>
        personalizado para vos
      </div>

      <div class="features">
        <div class="feat">
          <div class="check">&#10003;</div>
          <div class="text">Rutina con videos de cada ejercicio</div>
        </div>
        <div class="feat">
          <div class="check">&#10003;</div>
          <div class="text">Dieta con macros calculados</div>
        </div>
        <div class="feat">
          <div class="check">&#10003;</div>
          <div class="text">Seguimiento de progreso con fotos</div>
        </div>
        <div class="feat">
          <div class="check">&#10003;</div>
          <div class="text">App en tu celular 24/7</div>
        </div>
      </div>

      <div class="cta">EMPEZA TU TRANSFORMACION</div>
      <div class="bottom-text">pabloscarlattoentrenamientos.com</div>
    </div>
  </div>
</body>
</html>
