<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;background: radial-gradient(ellipse at 60% 30%, rgba(34,197,94,0.12) 0%, transparent 60%), radial-gradient(ellipse at 20% 70%, rgba(34,197,94,0.1) 0%, transparent 50%), linear-gradient(160deg, #0a0f0b 0%, #0d100d 50%, #090b09 100%);font-family:'Inter',sans-serif;color:#fff;position:relative;overflow:hidden;}
</style></head><body>
<div style="position:absolute;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:24px 24px;opacity:0.03;pointer-events:none;"></div>

<div style="position:absolute;top:20px;left:20px;width:40px;height:40px;border-top:2px solid #22c55e;border-left:2px solid #22c55e;opacity:0.5;"></div>
<div style="position:absolute;top:20px;right:20px;width:40px;height:40px;border-top:2px solid #22c55e;border-right:2px solid #22c55e;opacity:0.5;"></div>
<div style="position:absolute;bottom:60px;left:20px;width:40px;height:40px;border-bottom:2px solid #22c55e;border-left:2px solid #22c55e;opacity:0.5;"></div>
<div style="position:absolute;bottom:60px;right:20px;width:40px;height:40px;border-bottom:2px solid #22c55e;border-right:2px solid #22c55e;opacity:0.5;"></div>

<div style="position:relative;z-index:1;padding:40px 0;height:100%;display:flex;flex-direction:column;align-items:center;">
  <div style="margin-bottom:16px;"><img src="../logo-pablo.jpg" style="height:80px;filter:invert(1);mix-blend-mode:screen;" alt="Logo"></div>
  <div style="font-size:16px;letter-spacing:4px;color:#22c55e;margin-bottom:4px;">RESULTADO REAL</div>
  <div style="font-size:36px;font-weight:900;margin-bottom:16px;">TRANSFORMACION</div>
  <div style="display:flex;gap:12px;margin:20px 40px;">
  <div style="flex:1;position:relative;border-radius:12px;overflow:hidden;border:2px solid #333;">
    <img src="../front-before.jpg" style="width:100%;height:400px;object-fit:cover;">
    <div style="position:absolute;bottom:0;left:0;right:0;padding:8px;background:rgba(0,0,0,0.7);text-align:center;font-weight:700;font-size:16px;color:#22c55e;">ANTES</div>
  </div>
  <div style="flex:1;position:relative;border-radius:12px;overflow:hidden;border:2px solid #22c55e;">
    <img src="../front-after.jpg" style="width:100%;height:400px;object-fit:cover;">
    <div style="position:absolute;bottom:0;left:0;right:0;padding:8px;background:rgba(0,0,0,0.7);text-align:center;font-weight:700;font-size:16px;color:#22c55e;">DESPUES</div>
  </div>
</div>
  <div style="margin-top:16px;font-size:16px;color:#aaa;">12 semanas de entrenamiento personalizado</div>
</div>

<div style="position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:14px;color:#666;letter-spacing:2px;">Pablo Scarlatto | Entrenador Personal</div>
</body></html>
