<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Resultado Real</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #ffffff;
  }
  .story {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: #09090b;
  }
  .logo {
    position: absolute; top: 260px; left: 60px; height: 40px;
    filter: invert(1); z-index: 10; opacity: 0.9;
  }
  .footer {
    position: absolute; bottom: 220px; left: 0; right: 0;
    text-align: center; font-size: 22px; color: rgba(255,255,255,0.35);
    letter-spacing: 1px; z-index: 10;
  }
  .badge {
    display: inline-block; background: #22c55e; color: #09090b; font-size: 22px; font-weight: 800;
    padding: 10px 28px; border-radius: 30px; text-transform: uppercase; letter-spacing: 2px;
  }
  .top-section {
    position: absolute; top: 320px; left: 60px; right: 60px;
    z-index: 5;
  }
  .photo-container {
    position: absolute; top: 460px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 5;
  }
  .photo-container img {
    width: 100%; max-height: 800px; object-fit: contain;
  }
  .labels {
    position: absolute; top: 460px; left: 0; right: 0; height: 800px;
    z-index: 6; pointer-events: none;
  }
  .label {
    position: absolute; top: 20px;
    font-size: 28px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 4px; padding: 10px 24px; border-radius: 8px;
  }
  .label-left { left: 60px; background: rgba(239,68,68,0.85); }
  .label-right { right: 60px; background: rgba(34,197,94,0.85); }
  .bottom-section {
    position: absolute; bottom: 280px; left: 60px; right: 60px;
    z-index: 5;
  }
  .headline { font-size: 44px; font-weight: 800; line-height: 1.15; margin-bottom: 30px; max-width: 800px; }
  .stat {
    font-size: 64px; font-weight: 900; color: #22c55e; margin-bottom: 10px;
  }
  .stat-label { font-size: 28px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="story">
<img class="logo" src="../logo-pablo.jpg" alt="Pablo Scarlatto" />

  <div class="top-section">
    <div class="badge">RESULTADO REAL</div>
  </div>

  <div class="photo-container">
    <img src="../images/transf-mujer-lateral.jpg" alt="Transformaci&oacute;n" />
  </div>
  <div class="labels">
    <div class="label label-left">ANTES</div>
    <div class="label label-right">DESPU&Eacute;S</div>
  </div>

  <div class="bottom-section">
    <div class="headline">Esto es lo que pasa cuando segu&iacute;s el plan</div>
    <div class="stat">-8 kg</div>
    <div class="stat-label">en 3 meses</div>
  </div>

<div class="footer">pabloscarlattoentrenamientos.com</div>
</div>
</body>
</html>
