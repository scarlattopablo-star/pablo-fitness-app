<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Transformacion Hombre</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #ffffff;
  }
  .story {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: #09090b;
  }
  .logo {
    position: absolute; top: 260px; left: 60px; height: 40px;
    filter: invert(1); z-index: 10; opacity: 0.9;
  }
  .footer {
    position: absolute; bottom: 220px; left: 0; right: 0;
    text-align: center; font-size: 22px; color: rgba(255,255,255,0.35);
    letter-spacing: 1px; z-index: 10;
  }
  .top-section {
    position: absolute; top: 320px; left: 60px; right: 60px;
    z-index: 5;
  }
  .badge {
    display: inline-block; background: #22c55e; color: #09090b; font-size: 22px; font-weight: 800;
    padding: 10px 28px; border-radius: 30px; text-transform: uppercase; letter-spacing: 2px;
  }
  .photo-container {
    position: absolute; top: 440px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 5;
  }
  .photo-container img {
    width: 100%; max-height: 800px; object-fit: contain;
  }
  .labels {
    position: absolute; top: 440px; left: 0; right: 0; height: 800px;
    z-index: 6; pointer-events: none;
  }
  .label {
    position: absolute; top: 20px;
    font-size: 28px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 4px; padding: 10px 24px; border-radius: 8px;
  }
  .label-left { left: 60px; background: rgba(239,68,68,0.85); }
  .label-right { right: 60px; background: rgba(34,197,94,0.85); }
  .bottom-section {
    position: absolute; bottom: 270px; left: 60px; right: 60px;
    z-index: 10;
  }
  .headline { font-size: 52px; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 20px; }
  .stats-bar {
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 24px 32px;
    display: flex; justify-content: space-around; align-items: center;
  }
  .sbar-item { text-align: center; }
  .sbar-val { font-size: 40px; font-weight: 900; color: #22c55e; }
  .sbar-lbl { font-size: 22px; color: rgba(255,255,255,0.6); margin-top: 4px; }
</style>
</head>
<body>
<div class="story">
<img class="logo" src="../logo-pablo.jpg" alt="Pablo Scarlatto" />

  <div class="top-section">
    <div class="badge">RESULTADO</div>
  </div>

  <div class="photo-container">
    <img src="../images/transf-hombre-definicion.jpg" alt="Transformaci&oacute;n" />
  </div>
  <div class="labels">
    <div class="label label-left">ANTES</div>
    <div class="label label-right">DESPU&Eacute;S</div>
  </div>

  <div class="bottom-section">
    <div class="headline">DEFINICI&Oacute;N EN 4 MESES</div>
    <div class="stats-bar">
      <div class="sbar-item"><div class="sbar-val">-12 kg</div><div class="sbar-lbl">grasa</div></div>
      <div class="sbar-item"><div class="sbar-val">+3 kg</div><div class="sbar-lbl">m&uacute;sculo</div></div>
      <div class="sbar-item"><div class="sbar-val">4</div><div class="sbar-lbl">meses</div></div>
    </div>
  </div>

<div class="footer">pabloscarlattoentrenamientos.com</div>
</div>
</body>
</html>
