<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Mujer Resultado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #ffffff;
  }
  .story {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: #09090b;
  }
  .logo {
    position: absolute; top: 260px; left: 60px; height: 40px;
    filter: invert(1); z-index: 10; opacity: 0.9;
  }
  .footer {
    position: absolute; bottom: 220px; left: 0; right: 0;
    text-align: center; font-size: 22px; color: rgba(255,255,255,0.35);
    letter-spacing: 1px; z-index: 10;
  }
  .title {
    position: absolute; top: 330px; left: 60px; right: 60px;
    font-size: 46px; font-weight: 900; text-transform: uppercase;
    letter-spacing: 4px; text-align: center; z-index: 5;
  }
  .photos-container {
    position: absolute; top: 440px; left: 30px; right: 30px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    z-index: 5;
  }
  .photo-wrapper {
    position: relative; width: 100%;
    display: flex; justify-content: center;
  }
  .photo-wrapper img {
    width: 100%; max-height: 450px; object-fit: contain;
  }
  .photo-label {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    font-size: 24px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 3px; padding: 8px 22px; border-radius: 8px;
    background: rgba(34,197,94,0.85); color: #09090b;
    z-index: 6;
  }
  .bottom-info {
    position: absolute; bottom: 270px; left: 60px; right: 60px;
    z-index: 10; text-align: center;
  }
  .bi-headline { font-size: 42px; font-weight: 900; text-transform: uppercase; margin-bottom: 16px; }
  .bi-stats {
    font-size: 26px; color: rgba(255,255,255,0.7); font-weight: 600;
    background: rgba(0,0,0,0.6); padding: 16px 28px; border-radius: 12px;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="story">
<img class="logo" src="../logo-pablo.jpg" alt="Pablo Scarlatto" />

  <div class="title">TRANSFORMACI&Oacute;N COMPLETA</div>

  <div class="photos-container">
    <div class="photo-wrapper">
      <div class="photo-label">FRENTE</div>
      <img src="../images/transf-mujer3-frente.jpg" alt="Transformaci&oacute;n frente" />
    </div>
    <div class="photo-wrapper">
      <div class="photo-label">ESPALDA</div>
      <img src="../images/transf-mujer3-espalda.jpg" alt="Transformaci&oacute;n espalda" />
    </div>
  </div>

  <div class="bottom-info">
    <div class="bi-headline">Plan Tonificaci&oacute;n</div>
    <div class="bi-stats">3 meses de entrenamiento</div>
  </div>

<div class="footer">pabloscarlattoentrenamientos.com</div>
</div>
</body>
</html>
