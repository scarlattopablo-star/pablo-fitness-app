<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>Seguime</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #ffffff;
  }
  .story {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: #09090b;
  }
  .logo {
    position: absolute; top: 260px; left: 60px; height: 40px;
    filter: invert(1); z-index: 10; opacity: 0.9;
  }
  .footer {
    position: absolute; bottom: 220px; left: 0; right: 0;
    text-align: center; font-size: 22px; color: rgba(255,255,255,0.35);
    letter-spacing: 1px; z-index: 10;
  }
  .photo-container {
    position: absolute; top: 320px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 2;
  }
  .photo-container img {
    width: 100%; max-height: 600px; object-fit: contain;
  }
  .photo-overlay {
    position: absolute; top: 320px; left: 0; right: 0; height: 600px;
    background: linear-gradient(180deg, rgba(9,9,11,0.6) 0%, rgba(9,9,11,0.2) 40%, rgba(9,9,11,0.8) 100%);
    z-index: 3; pointer-events: none;
  }
  .content-section {
    position: absolute; top: 980px; left: 60px; right: 60px; bottom: 260px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 5;
  }
  .headline { font-size: 68px; font-weight: 900; text-transform: uppercase; text-align: center; line-height: 1.1; margin-bottom: 30px; }
  .arrow {
    font-size: 80px; color: #22c55e; text-align: center; margin-bottom: 30px;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .handle { font-size: 36px; font-weight: 700; color: #22c55e; text-align: center; margin-bottom: 24px; }
  .desc { font-size: 30px; color: rgba(255,255,255,0.7); text-align: center; max-width: 700px; line-height: 1.4; }
</style>
</head>
<body>
<div class="story">
<img class="logo" src="../logo-pablo.jpg" alt="Pablo Scarlatto" />

  <div class="photo-container">
    <img src="../images/gym-bg.png" alt="Gym" />
  </div>
  <div class="photo-overlay"></div>

  <div class="content-section">
    <div class="headline">SEGUIME<br/>PARA M&Aacute;S</div>
    <div class="arrow">&uarr;</div>
    <div class="handle">@pabloscarlattoentrenamientos</div>
    <div class="desc">Tips diarios de entrenamiento y nutrici&oacute;n</div>
  </div>

<div class="footer">pabloscarlattoentrenamientos.com</div>
</div>
</body>
</html>
