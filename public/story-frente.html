<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Story - Frente - Pablo Scarlatto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    position: relative;
  }

  /* Background effects */
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none;
  }
  .orb-tl { width: 500px; height: 500px; background: rgba(34,197,94,0.08); top: -100px; left: -100px; }
  .orb-br { width: 450px; height: 450px; background: rgba(34,197,94,0.06); bottom: -50px; right: -80px; }

  .content {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 44px 40px 50px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeInDown 0.6s ease-out both;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
    border-radius: 50px; padding: 10px 22px;
  }
  .brand .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
  .brand span { color: #22c55e; font-size: 16px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .badge {
    background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
    border-radius: 50px; padding: 8px 18px;
    color: #22c55e; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  }

  /* Title section */
  .title-section {
    text-align: center; margin-bottom: 28px;
    animation: fadeInUp 0.7s ease-out 0.2s both;
  }
  .pre-title {
    color: #22c55e; font-size: 18px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase; margin-bottom: 12px;
  }
  .green-line {
    width: 50px; height: 3px; background: #22c55e; border-radius: 2px;
    margin: 0 auto 16px; box-shadow: 0 0 10px rgba(34,197,94,0.4);
  }
  .title {
    font-size: 72px; font-weight: 900; line-height: 1; letter-spacing: -2px;
  }
  .title .green { color: #22c55e; text-shadow: 0 0 30px rgba(34,197,94,0.3); }

  /* Photo section */
  .photos {
    flex: 1; display: flex; gap: 14px;
    margin-bottom: 24px; min-height: 0;
    animation: fadeInUp 0.8s ease-out 0.4s both;
  }
  .photo-card {
    flex: 1; border-radius: 20px; overflow: hidden;
    position: relative;
    border: 2px solid rgba(255,255,255,0.06);
  }
  .photo-card.after { border-color: rgba(34,197,94,0.25); }
  .photo-card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .photo-card .tag {
    position: absolute; top: 16px; left: 16px;
    font-size: 15px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    padding: 8px 18px; border-radius: 50px;
  }
  .tag.before { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.8); backdrop-filter: blur(10px); }
  .tag.after { background: #22c55e; color: #000; }

  /* Arrow divider */
  .arrow-divider {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20;
    width: 52px; height: 52px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900; color: #000;
    animation: pulse 2s ease-in-out infinite;
  }
  .photos-wrapper {
    flex: 1; position: relative; display: flex; gap: 14px; min-height: 0;
  }

  /* View label */
  .view-label {
    text-align: center; margin-bottom: 12px;
    animation: fadeInUp 0.7s ease-out 0.5s both;
  }
  .view-label span {
    font-size: 16px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* Description */
  .desc {
    text-align: center; font-size: 22px; color: rgba(255,255,255,0.55);
    font-weight: 600; line-height: 1.4; margin-bottom: 28px;
    animation: fadeInUp 0.7s ease-out 0.6s both;
  }

  /* Features */
  .features {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin-bottom: 28px;
    animation: fadeInUp 0.7s ease-out 0.7s both;
  }
  .feat {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px; padding: 10px 20px;
    font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.6);
    display: flex; align-items: center; gap: 8px;
  }
  .feat .check { color: #22c55e; font-weight: 900; }

  /* CTA */
  .cta {
    animation: fadeInUp 0.7s ease-out 0.8s both;
  }
  .cta-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #000; font-size: 26px; font-weight: 900;
    padding: 24px; border-radius: 18px; text-align: center;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 6px 30px rgba(34,197,94,0.3);
    margin-bottom: 14px;
  }
  .cta-sub {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 16px; color: rgba(255,255,255,0.4); font-weight: 600;
  }
  .cta-sub strong { color: #22c55e; }

  /* Swipe up */
  .swipe {
    text-align: center; margin-top: 16px;
    animation: fadeInUp 0.7s ease-out 1s both;
  }
  .swipe-arrow {
    font-size: 28px; color: rgba(255,255,255,0.25);
    animation: bounceUp 1.5s ease-in-out infinite;
  }
  .swipe-text {
    font-size: 13px; color: rgba(255,255,255,0.2); font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; margin-top: 2px;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
  }
  @keyframes bounceUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-tl"></div>
  <div class="orb orb-br"></div>

  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="brand"><div class="dot"></div><span>Pablo Scarlatto</span></div>
      <div class="badge">Resultados</div>
    </div>

    <!-- Title -->
    <div class="title-section">
      <div class="pre-title">/// vista frontal</div>
      <div class="green-line"></div>
      <div class="title">TU MEJOR<br><span class="green">VERSION</span></div>
    </div>

    <!-- Photos -->
    <div class="photos">
      <div class="photos-wrapper">
        <div class="photo-card">
          <img src="front-before.jpg" alt="Antes - Frente">
          <div class="tag before">ANTES</div>
        </div>
        <div class="arrow-divider">&#10132;</div>
        <div class="photo-card after">
          <img src="front-after.jpg" alt="Despues - Frente">
          <div class="tag after">DESPUES</div>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="desc">El cambio empieza cuando decidis<br>dar el primer paso</div>

    <!-- Features -->
    <div class="features">
      <div class="feat"><span class="check">&#10003;</span> Plan personalizado</div>
      <div class="feat"><span class="check">&#10003;</span> Nutricion a medida</div>
      <div class="feat"><span class="check">&#10003;</span> App exclusiva</div>
      <div class="feat"><span class="check">&#10003;</span> Seguimiento semanal</div>
    </div>

    <!-- CTA -->
    <div class="cta">
      <div class="cta-btn">ESCRIBIME POR DM</div>
      <div class="cta-sub">&#128241; Descarga la app <strong>Pablo Fitness</strong></div>
    </div>

    <!-- Swipe -->
    <div class="swipe">
      <div class="swipe-arrow">&#8593;</div>
      <div class="swipe-text">Link en bio</div>
    </div>
  </div>
</body>
</html>
